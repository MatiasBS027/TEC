<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>El Buen Café – Cajero</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #f5f0e8; height: 100vh; display: flex; flex-direction: column; }

  header {
    background: #3b1f0a;
    color: white;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo { font-size: 18px; font-weight: 700; }
  .logo span { color: #c8873a; }
  .user { font-size: 13px; color: #ccc; }

  .origin-bar {
    background: #fff8ef;
    border-bottom: 1px solid #ddd;
    padding: 8px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    color: #555;
  }
  .toggle-btns { display: flex; gap: 6px; }
  .tog {
    padding: 4px 14px;
    border-radius: 20px;
    border: 1px solid #ccc;
    background: white;
    font-size: 12px;
    cursor: pointer;
  }
  .tog.active { background: #3b1f0a; color: white; border-color: #3b1f0a; }

  main { display: flex; flex: 1; overflow: hidden; }

  .catalog {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
  }
  .catalog h3 { font-size: 14px; color: #888; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 1px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  .product {
    background: white;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 18px 14px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .product:hover { border-color: #c8873a; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .product:active { transform: scale(0.97); }
  .product .icon { font-size: 36px; margin-bottom: 8px; }
  .product .name { font-weight: 600; font-size: 14px; color: #222; }
  .product .price { font-size: 13px; color: #c8873a; margin-top: 4px; font-weight: 600; }

  .cart {
    width: 280px;
    background: white;
    border-left: 1px solid #ddd;
    display: flex;
    flex-direction: column;
  }
  .cart-title {
    padding: 16px 18px;
    font-weight: 700;
    font-size: 15px;
    border-bottom: 1px solid #eee;
    color: #222;
  }
  .cart-items { flex: 1; padding: 12px 16px; overflow-y: auto; }
  .cart-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid #f0f0f0;
    font-size: 13px;
  }
  .item-left { display: flex; flex-direction: column; }
  .item-name { font-weight: 600; color: #222; }
  .item-sub { color: #999; font-size: 12px; }
  .item-right { font-weight: 600; color: #333; }

  .empty { color: #bbb; font-size: 13px; text-align: center; padding: 30px 0; }

  .cart-footer { padding: 16px 18px; border-top: 1px solid #eee; }
  .total-row {
    display: flex;
    justify-content: space-between;
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 14px;
    color: #111;
  }
  .btns { display: flex; gap: 8px; }
  .btn {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    color: white;
  }
  .btn-green { background: #2d7a4f; }
  .btn-red { background: #c0392b; }
</style>
</head>
<body>

<header>
  <div class="logo">☕ El <span>Buen</span> Café</div>
  <div class="user">👤 Cajero: Ana Pérez</div>
</header>

<div class="origin-bar">
  <span>Origen del pedido:</span>
  <div class="toggle-btns">
    <div class="tog active" onclick="setOrigin(this)">📍 Presencial</div>
    <div class="tog" onclick="setOrigin(this)">📱 Redes Sociales</div>
  </div>
</div>

<main>
  <section class="catalog">
    <h3>Productos</h3>
    <div class="grid" id="grid"></div>
  </section>

  <aside class="cart">
    <div class="cart-title">🛒 Orden actual</div>
    <div class="cart-items" id="cart-items">
      <div class="empty">Sin productos aún</div>
    </div>
    <div class="cart-footer">
      <div class="total-row">
        <span>Total</span>
        <span id="total">₡0</span>
      </div>
      <div class="btns">
        <button class="btn btn-green" onclick="confirm_()">✓ Confirmar</button>
        <button class="btn btn-red" onclick="cancel_()">✕ Cancelar</button>
      </div>
    </div>
  </aside>
</main>

<script>
const products = [
  { name:'Espresso', price:1200, icon:'☕' },
  { name:'Latte', price:1800, icon:'🥛' },
  { name:'Capuchino', price:1900, icon:'🫧' },
  { name:'Americano', price:1400, icon:'☕' },
  { name:'Mocha', price:2100, icon:'🍫' },
  { name:'Macchiato', price:1600, icon:'🌰' },
];
let cart = {};

document.getElementById('grid').innerHTML = products.map((p,i) => `
  <div class="product" onclick="add(${i})">
    <div class="icon">${p.icon}</div>
    <div class="name">${p.name}</div>
    <div class="price">₡${p.price.toLocaleString()}</div>
  </div>`).join('');

function add(i) {
  const p = products[i];
  cart[p.name] = cart[p.name] || { ...p, qty:0 };
  cart[p.name].qty++;
  render();
}

function render() {
  const items = Object.values(cart);
  const container = document.getElementById('cart-items');
  if (!items.length) { container.innerHTML = '<div class="empty">Sin productos aún</div>'; document.getElementById('total').textContent='₡0'; return; }
  const total = items.reduce((s,i)=>s+i.price*i.qty,0);
  container.innerHTML = items.map(i=>`
    <div class="cart-item">
      <div class="item-left"><div class="item-name">${i.name} x${i.qty}</div><div class="item-sub">₡${i.price.toLocaleString()} c/u</div></div>
      <div class="item-right">₡${(i.price*i.qty).toLocaleString()}</div>
    </div>`).join('');
  document.getElementById('total').textContent = '₡'+total.toLocaleString();
}

function setOrigin(el) { document.querySelectorAll('.tog').forEach(t=>t.classList.remove('active')); el.classList.add('active'); }
function confirm_() { if(!Object.keys(cart).length) return alert('Agrega productos'); alert('Pedido confirmado ✓'); cart={}; render(); }
function cancel_() { cart={}; render(); }
</script>
</body>
</html>
