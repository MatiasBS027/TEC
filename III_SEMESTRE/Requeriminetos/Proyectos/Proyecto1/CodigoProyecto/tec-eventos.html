<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Plataforma de Eventos TEC</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
/* ===========================
   CSS VARIABLES & RESET
=========================== */
:root {
  --tec-blue: #003B8E;
  --tec-gold: #F5A800;
  --tec-light: #F0F4FF;
  --tec-dark: #0A0F1E;
  --tec-gray: #6B7280;
  --tec-border: #DDE3F0;
  --tec-success: #10B981;
  --tec-danger: #EF4444;
  --tec-warning: #F59E0B;
  --tec-pending: #8B5CF6;
  --sidebar-w: 220px;
  --header-h: 60px;
  --radius: 10px;
  --shadow: 0 2px 12px rgba(0,59,142,0.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--tec-light);color:var(--tec-dark);min-height:100vh;}
h1,h2,h3,h4{font-family:'Syne',sans-serif;}
a{color:inherit;text-decoration:none;}
button{cursor:pointer;font-family:'DM Sans',sans-serif;}
input,select,textarea{font-family:'DM Sans',sans-serif;}

/* ===========================
   UTILITIES
=========================== */
.hidden{display:none!important;}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:600;}
.badge-success{background:#D1FAE5;color:#065F46;}
.badge-warning{background:#FEF3C7;color:#92400E;}
.badge-danger{background:#FEE2E2;color:#991B1B;}
.badge-purple{background:#EDE9FE;color:#5B21B6;}
.badge-blue{background:#DBEAFE;color:#1E40AF;}

/* ===========================
   LAYOUT SHELL
=========================== */
#app{display:flex;flex-direction:column;min-height:100vh;}

/* ===========================
   AUTH SCREENS
=========================== */
.auth-wrap{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background: linear-gradient(135deg, var(--tec-blue) 0%, #001f5c 100%);
  position:relative;overflow:hidden;
}
.auth-wrap::before{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.auth-card{
  background:#fff;border-radius:20px;padding:44px 40px;width:420px;max-width:95vw;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);position:relative;z-index:1;
}
.auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
.auth-logo-icon{
  width:46px;height:46px;background:var(--tec-blue);border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:#fff;
}
.auth-logo-text{font-family:'Syne',sans-serif;font-weight:700;font-size:18px;color:var(--tec-blue);line-height:1.2;}
.auth-logo-text span{display:block;font-size:12px;font-weight:400;color:var(--tec-gray);}
.auth-title{font-size:22px;font-weight:700;margin-bottom:24px;color:var(--tec-dark);}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:13px;font-weight:500;color:var(--tec-gray);margin-bottom:6px;}
.form-control{
  width:100%;padding:10px 14px;border:1.5px solid var(--tec-border);border-radius:8px;
  font-size:14px;outline:none;transition:border-color .2s;
}
.form-control:focus{border-color:var(--tec-blue);}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;border:none;
  transition:all .2s;
}
.btn-primary{background:var(--tec-blue);color:#fff;}
.btn-primary:hover{background:#002d6e;}
.btn-gold{background:var(--tec-gold);color:#fff;}
.btn-gold:hover{background:#d99200;}
.btn-success{background:var(--tec-success);color:#fff;}
.btn-success:hover{background:#059669;}
.btn-danger{background:var(--tec-danger);color:#fff;}
.btn-danger:hover{background:#dc2626;}
.btn-outline{background:transparent;color:var(--tec-blue);border:1.5px solid var(--tec-blue);}
.btn-outline:hover{background:var(--tec-blue);color:#fff;}
.btn-sm{padding:6px 14px;font-size:12px;}
.btn-block{width:100%;margin-top:4px;}
.auth-footer{margin-top:20px;text-align:center;font-size:13px;color:var(--tec-gray);}
.auth-footer a{color:var(--tec-blue);font-weight:600;cursor:pointer;}
.auth-divider{border:none;border-top:1px solid var(--tec-border);margin:18px 0;}
.dev-buttons{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
.dev-label{font-size:11px;color:var(--tec-gray);text-align:center;margin-bottom:4px;}
.btn-dev{
  padding:8px;border-radius:7px;font-size:12px;font-weight:600;border:none;cursor:pointer;
  transition:all .15s;
}
.btn-dev-student{background:#DBEAFE;color:#1E40AF;}
.btn-dev-student:hover{background:#BFDBFE;}
.btn-dev-org{background:#D1FAE5;color:#065F46;}
.btn-dev-org:hover{background:#A7F3D0;}
.btn-dev-admin{background:#FEE2E2;color:#991B1B;}
.btn-dev-admin:hover{background:#FECACA;}

/* SUCCESS SCREEN */
.success-screen{text-align:center;padding:20px 0;}
.success-icon{font-size:48px;margin-bottom:16px;}
.success-screen h3{font-size:20px;font-weight:700;color:var(--tec-success);margin-bottom:8px;}
.success-screen p{color:var(--tec-gray);font-size:14px;}

/* ===========================
   MAIN LAYOUT (POST LOGIN)
=========================== */
.main-layout{display:flex;min-height:100vh;}

/* SIDEBAR */
.sidebar{
  width:var(--sidebar-w);background:var(--tec-blue);
  display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;
  z-index:100;transition:transform .3s;
}
.sidebar-logo{
  padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,0.1);
  display:flex;align-items:center;gap:10px;
}
.sidebar-logo-icon{
  width:36px;height:36px;background:var(--tec-gold);border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:#fff;
}
.sidebar-logo-text{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:#fff;line-height:1.3;}
.sidebar-logo-text span{display:block;font-size:10px;font-weight:400;opacity:.6;}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto;}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:11px 20px;
  color:rgba(255,255,255,0.75);font-size:13.5px;font-weight:500;
  cursor:pointer;transition:all .15s;border-left:3px solid transparent;
}
.nav-item:hover{background:rgba(255,255,255,0.08);color:#fff;}
.nav-item.active{background:rgba(255,255,255,0.14);color:#fff;border-left-color:var(--tec-gold);}
.nav-icon{font-size:17px;min-width:22px;text-align:center;}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,0.1);}
.sidebar-user{display:flex;align-items:center;gap:10px;}
.sidebar-avatar{
  width:34px;height:34px;border-radius:50%;background:var(--tec-gold);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:13px;color:#fff;
}
.sidebar-user-info{flex:1;}
.sidebar-user-name{font-size:12px;font-weight:600;color:#fff;}
.sidebar-user-role{font-size:10px;color:rgba(255,255,255,0.5);}

/* TOPBAR */
.topbar{
  height:var(--header-h);background:#fff;border-bottom:1px solid var(--tec-border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;position:fixed;top:0;left:var(--sidebar-w);right:0;z-index:90;
  box-shadow:var(--shadow);
}
.topbar-title{font-family:'Syne',sans-serif;font-weight:700;font-size:17px;color:var(--tec-dark);}
.topbar-right{display:flex;align-items:center;gap:12px;}
.notif-btn{
  position:relative;background:none;border:none;font-size:20px;cursor:pointer;
  color:var(--tec-gray);padding:4px;
}
.notif-dot{
  position:absolute;top:2px;right:2px;width:8px;height:8px;
  background:var(--tec-gold);border-radius:50%;
}

/* CONTENT AREA */
.content-area{
  margin-left:var(--sidebar-w);margin-top:var(--header-h);
  padding:28px;flex:1;min-height:calc(100vh - var(--header-h));
}

/* ===========================
   CARDS & PANELS
=========================== */
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;}
.card-title{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--tec-dark);}

.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;margin-bottom:24px;}
.stat-card{
  background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);
  border-top:4px solid var(--tec-blue);
}
.stat-card.gold{border-top-color:var(--tec-gold);}
.stat-card.green{border-top-color:var(--tec-success);}
.stat-card.purple{border-top-color:var(--tec-pending);}
.stat-label{font-size:12px;color:var(--tec-gray);margin-bottom:6px;}
.stat-value{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--tec-blue);}
.stat-card.gold .stat-value{color:var(--tec-gold);}
.stat-card.green .stat-value{color:var(--tec-success);}
.stat-card.purple .stat-value{color:var(--tec-pending);}

/* EVENT CARDS */
.events-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;}
.event-card{
  background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);
  overflow:hidden;transition:transform .2s, box-shadow .2s;
}
.event-card:hover{transform:translateY(-3px);box-shadow:0 6px 24px rgba(0,59,142,0.15);}
.event-card-img{
  height:100px;background:linear-gradient(135deg,var(--tec-blue),#0060e6);
  display:flex;align-items:center;justify-content:center;font-size:32px;
}
.event-card-body{padding:16px;}
.event-card-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:8px;}
.event-card-meta{display:flex;flex-direction:column;gap:3px;font-size:12px;color:var(--tec-gray);}
.event-card-meta span{display:flex;align-items:center;gap:4px;}
.event-card-footer{
  padding:10px 16px;border-top:1px solid var(--tec-border);
  display:flex;align-items:center;justify-content:space-between;
}
.event-cupos{font-size:12px;color:var(--tec-gray);}
.category-chip{
  font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;
  background:var(--tec-light);color:var(--tec-blue);
}

/* SEARCH BAR */
.search-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.search-input{flex:1;min-width:160px;padding:9px 14px;border:1.5px solid var(--tec-border);border-radius:8px;font-size:14px;outline:none;}
.search-input:focus{border-color:var(--tec-blue);}
.filter-group{display:flex;gap:8px;flex-wrap:wrap;}
.filter-select{padding:9px 12px;border:1.5px solid var(--tec-border);border-radius:8px;font-size:13px;outline:none;background:#fff;}

/* TABLE */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th,td{padding:11px 14px;text-align:left;font-size:13px;border-bottom:1px solid var(--tec-border);}
th{font-weight:600;color:var(--tec-gray);font-size:12px;text-transform:uppercase;letter-spacing:.4px;background:var(--tec-light);}
tr:hover td{background:#FAFBFF;}
.actions-cell{display:flex;gap:6px;flex-wrap:wrap;}

/* DETAIL VIEW */
.detail-header{margin-bottom:24px;}
.detail-banner{
  height:160px;background:linear-gradient(135deg,var(--tec-blue),#0060e6);
  border-radius:var(--radius);display:flex;align-items:center;justify-content:center;
  font-size:48px;margin-bottom:16px;
}
.detail-title{font-size:22px;font-weight:800;margin-bottom:8px;}
.detail-meta{display:flex;flex-wrap:wrap;gap:14px;color:var(--tec-gray);font-size:13px;}
.detail-meta span{display:flex;align-items:center;gap:5px;}
.detail-desc{margin:18px 0;line-height:1.7;color:#374151;font-size:14px;}
.detail-actions{display:flex;gap:10px;flex-wrap:wrap;}
.detail-stats{display:flex;gap:20px;margin-top:16px;}
.detail-stat{text-align:center;}
.detail-stat-val{font-family:'Syne',sans-serif;font-weight:700;font-size:20px;color:var(--tec-blue);}
.detail-stat-label{font-size:11px;color:var(--tec-gray);}

/* MESSAGES */
.msg-list{display:flex;flex-direction:column;gap:12px;}
.msg-item{
  background:#fff;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);
  display:flex;align-items:flex-start;gap:12px;
}
.msg-avatar{width:38px;height:38px;border-radius:50%;background:var(--tec-blue);display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;font-weight:700;min-width:38px;}
.msg-body{flex:1;}
.msg-sender{font-weight:600;font-size:13px;}
.msg-time{font-size:11px;color:var(--tec-gray);margin-left:8px;}
.msg-preview{font-size:13px;color:var(--tec-gray);margin-top:3px;}
.msg-actions{display:flex;gap:6px;}

/* FORM */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.form-section-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--tec-blue);margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid var(--tec-light);}
.textarea{resize:vertical;min-height:90px;}
.img-upload{
  border:2px dashed var(--tec-border);border-radius:8px;padding:24px;text-align:center;
  color:var(--tec-gray);font-size:13px;cursor:pointer;transition:border-color .2s;
}
.img-upload:hover{border-color:var(--tec-blue);}
.form-actions{display:flex;gap:10px;margin-top:20px;}

/* ANNOUNCEMENTS */
.announce-compose{margin-bottom:24px;}
.announce-compose textarea{width:100%;min-height:100px;padding:14px;border:1.5px solid var(--tec-border);border-radius:8px;font-size:14px;outline:none;resize:vertical;}
.announce-compose textarea:focus{border-color:var(--tec-blue);}

/* PROFILE */
.profile-header{display:flex;align-items:center;gap:20px;margin-bottom:28px;}
.profile-pic{
  width:72px;height:72px;border-radius:50%;background:var(--tec-blue);
  display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;font-weight:700;
}
.profile-info h3{font-size:18px;font-weight:700;}
.profile-info p{font-size:13px;color:var(--tec-gray);}

/* APPROVAL CARDS */
.approval-list{display:flex;flex-direction:column;gap:14px;}
.approval-card{
  background:#fff;border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);
  display:flex;align-items:center;gap:16px;
}
.approval-icon{font-size:28px;min-width:44px;height:44px;background:var(--tec-light);border-radius:10px;display:flex;align-items:center;justify-content:center;}
.approval-info{flex:1;}
.approval-title{font-weight:700;font-size:14px;margin-bottom:4px;}
.approval-meta{font-size:12px;color:var(--tec-gray);}
.approval-actions{display:flex;gap:8px;}

/* NOTIFICATION PANEL */
.notif-panel{
  position:fixed;top:var(--header-h);right:0;width:340px;background:#fff;
  box-shadow:-4px 0 20px rgba(0,0,0,0.1);z-index:200;height:calc(100vh - var(--header-h));
  overflow-y:auto;padding:20px;transform:translateX(100%);transition:transform .3s;
}
.notif-panel.open{transform:translateX(0);}
.notif-panel-title{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;}
.notif-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--tec-gray);}
.notif-item{padding:12px 0;border-bottom:1px solid var(--tec-border);}
.notif-item:last-child{border:none;}
.notif-item-title{font-weight:600;font-size:13px;margin-bottom:4px;}
.notif-item-text{font-size:12px;color:var(--tec-gray);}
.notif-item-time{font-size:11px;color:var(--tec-gold);margin-top:3px;}

/* ===========================
   RESPONSIVE
=========================== */
@media(max-width:640px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .topbar{left:0;}
  .content-area{margin-left:0;}
  .form-row{grid-template-columns:1fr;}
}

/* ===========================
   TRANSITIONS
=========================== */
.screen{animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

/* MODAL */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.modal{background:#fff;border-radius:16px;padding:28px;max-width:480px;width:100%;max-height:80vh;overflow-y:auto;}
.modal-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:16px;}

/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--tec-light);border-radius:9px;padding:4px;}
.tab-btn{
  flex:1;padding:8px 14px;border:none;border-radius:7px;font-size:13px;
  font-weight:600;background:transparent;color:var(--tec-gray);cursor:pointer;transition:all .2s;
}
.tab-btn.active{background:#fff;color:var(--tec-blue);box-shadow:0 1px 6px rgba(0,0,0,0.08);}

/* REPORTS PLACEHOLDER */
.chart-placeholder{
  background:var(--tec-light);border-radius:var(--radius);height:200px;
  display:flex;align-items:center;justify-content:center;color:var(--tec-gray);font-size:14px;
  border:2px dashed var(--tec-border);
}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ===================================================
   STATE
=================================================== */
let state = {
  screen: 'login',       // current screen
  prevScreen: null,
  role: null,            // 'student' | 'organizer' | 'admin'
  notifOpen: false,
  activeTab: 0,
  editingProfile: false,
  modalOpen: false,
  // sample data
  events: [
    {id:1, title:'Charla de Inteligencia Artificial', category:'Académico', date:'2024-10-26', location:'Auditorio Principal, TEC Cartago', cupos:50, icon:'🤖', status:'Activo', participants:[], taken:12, attendance:10},
    {id:2, title:'Torneo de Fútbol Intercampus', category:'Deportivo', date:'2024-11-15', location:'Cancha de Fútbol, TEC Cartago', cupos:20, icon:'⚽', status:'Pendiente', participants:[], taken:8, attendance:0},
    {id:3, title:'Concierto de la Orquesta Sinfónica', category:'Cultural', date:'2024-12-01', location:'Teatro Universitario, TEC San José', cupos:200, icon:'🎵', status:'Finalizado', participants:[], taken:180, attendance:170},
    {id:4, title:'Charla de Energías Limpias', category:'Académico', date:'2024-10-26', location:'Auditorio Principal, TEC Cartago', cupos:50, icon:'🌱', status:'Activo', participants:[], taken:20, attendance:0},
    {id:5, title:'Hackathon Anual', category:'Tecnología', date:'2024-09-01', location:'Laboratorio B, TEC Cartago', cupos:100, icon:'💻', status:'Finalizado', participants:[], taken:95, attendance:90},
  ],
  myRegistrations: [1, 3],
  messages: [
    {id:1, from:'Charla de IA', time:'7:34 AM', text:'Se cancela sesión por falta de participantes.', subject:'Cancelación'},
    {id:2, from:'Taller de Programación', time:'12:34 PM', text:'Favor traer materiales solicitados.', subject:'Recordatorio'},
    {id:3, from:'Orquesta Sinfónica', time:'2:44 PM', text:'Descripción del aviso...', subject:'Información'},
  ],
  currentEventId: null,
  currentMsgId: null,
};

/* ===================================================
   ROUTER
=================================================== */
function navigate(screen, data={}) {
  state.prevScreen = state.screen;
  state.screen = screen;
  if (data.eventId !== undefined) state.currentEventId = data.eventId;
  if (data.msgId !== undefined) state.currentMsgId = data.msgId;
  render();
}

function goBack() {
  navigate(state.prevScreen || 'login');
}

/* ===================================================
   RENDER ENTRY
=================================================== */
function render() {
  const app = document.getElementById('app');
  // Auth screens
  const authScreens = ['login','register','register-success'];
  if (authScreens.includes(state.screen)) {
    app.innerHTML = renderAuth();
    attachAuthEvents();
    return;
  }
  // Main app
  app.innerHTML = `
    ${renderSidebar()}
    ${renderTopbar()}
    <div class="content-area" id="content-area">
      ${renderScreen()}
    </div>
    ${renderNotifPanel()}
  `;
  attachMainEvents();
}

/* ===================================================
   AUTH
=================================================== */
function renderAuth() {
  if (state.screen === 'login') return `
  <div class="auth-wrap">
    <div class="auth-card screen">
      <div class="auth-logo">
        <div class="auth-logo-icon">TEC</div>
        <div class="auth-logo-text">Plataforma de Eventos<span>Tecnológico de Costa Rica</span></div>
      </div>
      <h2 class="auth-title">Iniciar Sesión</h2>

function renderEventCard(event, ctx='student') {
  const icons = {Académico:'📚',Deportivo:'⚽',Cultural:'🎵',Tecnología:'💻',Desarrollo:'🖥️',Negocios:'💼'};
  const icon = icons[event.category]||'📅';
  return `
  <div class="event-card">
    <div class="event-card-img" style="background:linear-gradient(135deg,${getCatColor(event.category)});">${icon}</div>
    <div class="event-card-body">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">
        <span class="category-chip">${event.category}</span>
        <span class="badge ${getStatusBadge(event.status)}">${event.status}</span>
      </div>
      <div class="event-card-title">${event.title}</div>
      <div class="event-card-meta">
        <span>📅 ${event.date}</span>
        <span>📍 ${event.location}</span>
      </div>
    </div>
    <div class="event-card-footer">
      <span class="event-cupos">Cupos: ${event.cupos}</span>
      <button class="btn btn-primary btn-sm" onclick="viewEvent(${event.id},'${ctx}')">Ver detalles</button>
    </div>
  </div>`;
}

function getCatColor(cat) {
  const map = {Académico:'#003B8E,#0060e6',Deportivo:'#065F46,#10B981',Cultural:'#7C3AED,#A78BFA',Tecnología:'#0F766E,#14B8A6',Desarrollo:'#1D4ED8,#60A5FA',Negocios:'#92400E,#F59E0B'};
  return map[cat]||'#003B8E,#0060e6';
}
function getStatusBadge(s){return s==='Activo'?'badge-success':s==='Pendiente'?'badge-warning':s==='Rechazado'?'badge-danger':'badge-blue';}

function viewEvent(id, ctx) {
  state.currentEventId = id;
  if(ctx==='organizer') navigate('event-detail-org', {eventId:id});
  else navigate('event-detail', {eventId:id});
}

function renderEventDetail(ctx) {
  const ev = state.events.find(e=>e.id===state.currentEventId) || state.events[0];
  const icons = {Académico:'📚',Deportivo:'⚽',Cultural:'🎵',Tecnología:'💻',Desarrollo:'🖥️',Negocios:'💼'};
  const icon = icons[ev.category]||'📅';
  const isRegistered = state.myRegistrations.includes(ev.id);
  
  const orgButtons = ctx==='organizer' ? `
    <button class="btn btn-gold" onclick="navigate('edit-event')">✏️ Modificar Evento</button>
    <button class="btn btn-outline" onclick="navigate('participants')">👥 Ver participantes</button>
    <button class="btn btn-outline" onclick="navigate('my-events')">← Volver</button>
  ` : `
    <button class="btn btn-primary" onclick="registerEvent(${ev.id})">${isRegistered?'✓ Registrado':'Registrarse en el evento'}</button>
    <button class="btn btn-outline" onclick="goBack()">← Volver</button>
  `;
  
  return `<div class="screen">
    <div class="detail-banner">${icon}</div>
    <div class="detail-header">
      <div style="display:flex;gap:8px;margin-bottom:10px;">
        <span class="category-chip">${ev.category}</span>
        <span class="badge ${getStatusBadge(ev.status)}">${ev.status}</span>
      </div>
      <h2 class="detail-title">${ev.title}</h2>
      <div class="detail-meta">
        <span>📅 ${ev.date}</span>
        <span>📍 ${ev.location}</span>
        <span>🏛️ Organizado por: Unidad Organizadora TEC</span>
        <span>🎟️ Cupos disponibles: ${ev.cupos}</span>
      </div>
    </div>
    <div class="card">
      <div class="detail-desc">Esta es una descripción detallada del evento. Aquí se puede incluir toda la información relevante, como la agenda, los ponentes, los objetivos y cualquier otro detalle importante para los asistentes.</div>
      ${ctx==='organizer' ? `
      <div class="detail-stats">
        <div class="detail-stat"><div class="detail-stat-val">${ev.taken}</div><div class="detail-stat-label">Cupos tomados</div></div>
        <div class="detail-stat"><div class="detail-stat-val">${ev.attendance}</div><div class="detail-stat-label">Asistencias</div></div>
        <div class="detail-stat"><div class="detail-stat-val">${ev.cupos}</div><div class="detail-stat-label">Cupos totales</div></div>
      </div>` : ''}
      <div class="detail-actions" style="margin-top:20px;">${orgButtons}</div>
    </div>
  </div>`;
}

function registerEvent(id) {
  if (!state.myRegistrations.includes(id)) {
    state.myRegistrations.push(id);
    render();
  }
}

}

function publishAnnounce() {
  const ta = document.getElementById('new-announce');
  if(ta && ta.value.trim()) {
    state.messages.unshift({id:Date.now(),from:'Administración TEC',time:'Ahora',text:ta.value.trim(),subject:'Anuncio'});
    render();
  }
}

/* ===================================================
   MAIN EVENTS ATTACHMENT
=================================================== */
function attachMainEvents() {
  // click outside notif panel to close
  document.addEventListener('click', function handler(e) {
    if (!e.target.closest('#notif-panel') && !e.target.closest('.notif-btn')) {
      state.notifOpen = false;
      const panel = document.getElementById('notif-panel');
      if(panel) panel.classList.remove('open');
    }
  }, {once:true});
}

/* ===================================================
   INIT
=================================================== */
render();
